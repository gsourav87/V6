name: Daily Panchang Push
on:
  schedule:
    - cron: "30 1 * * *"
    - cron: "30 7 * * *"
    - cron: "30 13 * * *"
  workflow_dispatch:
    inputs:
      slot:
        description: "Slot (morning | noon | evening)"
        required: false
        default: "morning"
jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Determine slot
        id: slot
        run: |
          if [ -n "${{ github.event.inputs.slot }}" ]; then
            echo "slot=${{ github.event.inputs.slot }}" >> "$GITHUB_OUTPUT"
          else
            H=$((10#$(date -u +%H)))
            if [ "$H" -lt 5 ]; then S=morning; elif [ "$H" -lt 11 ]; then S=noon; else S=evening; fi
            echo "slot=$S" >> "$GITHUB_OUTPUT"
          fi
      - name: Trigger push send
        run: |
          curl -fsS -X POST \
            "https://www.sothikbanglacalendar.live/api/send-push?slot=${{ steps.slot.outputs.slot }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" -w "\nHTTP %{http_code}\n"
