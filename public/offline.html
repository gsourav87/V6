<!doctype html>
<html lang="bn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>অফলাইন — সঠিক বাংলা ক্যালেন্ডার</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;text-align:center;
      font-family:system-ui,'Hind Siliguri',sans-serif;color:#fff;padding:24px;
      background:linear-gradient(135deg,#fb923c 0%,#ea580c 55%,#9a3412 100%);}
    .card{max-width:360px}
    .icon{width:84px;height:84px;margin:0 auto 18px;display:block}
    h1{font-size:22px;margin:0 0 8px}
    p{font-size:15px;line-height:1.7;opacity:.9;margin:0 0 22px}
    button{font:inherit;font-size:15px;font-weight:700;color:#9a3412;background:#fff;
      border:0;border-radius:999px;padding:11px 26px;cursor:pointer}
  </style>
</head>
<body>
  <div class="card">
    <svg class="icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="12" y="20" width="76" height="68" rx="12" fill="#ffffff"/>
      <rect x="28" y="12" width="8" height="20" rx="4" fill="#9a3412"/>
      <rect x="64" y="12" width="8" height="20" rx="4" fill="#9a3412"/>
      <circle cx="50" cy="62" r="16" fill="none" stroke="#ea580c" stroke-width="6"/>
    </svg>
    <h1>আপনি অফলাইনে আছেন</h1>
    <p>ইন্টারনেট সংযোগ পাওয়া যাচ্ছে না। সংযোগ ফিরে এলে আবার চেষ্টা করুন।</p>
    <button onclick="location.reload()">আবার চেষ্টা করুন</button>
  </div>
</body>
</html>
