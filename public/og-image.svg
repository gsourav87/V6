<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="45%" stop-color="#7c2d12"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
    <linearGradient id="icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="60" cy="60" r="220" fill="rgba(255,255,255,0.025)"/>
  <circle cx="1140" cy="570" r="280" fill="rgba(255,255,255,0.025)"/>
  <circle cx="1080" cy="70" r="140" fill="rgba(234,88,12,0.12)"/>
  <circle cx="120" cy="560" r="100" fill="rgba(99,102,241,0.15)"/>

  <!-- Main card -->
  <rect x="60" y="60" width="1080" height="510" rx="32" fill="url(#card)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

  <!-- Calendar icon -->
  <rect x="546" y="100" width="108" height="108" rx="22" fill="url(#icon)"/>
  <rect x="562" y="128" width="76" height="62" rx="5" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2.5"/>
  <line x1="562" y1="145" x2="638" y2="145" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <line x1="572" y1="120" x2="572" y2="133" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="628" y1="120" x2="628" y2="133" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <text x="600" y="183" text-anchor="middle" fill="white" font-size="22" font-family="serif" font-weight="700" opacity="0.9">ব</text>

  <!-- Main title in Bengali -->
  <text x="600" y="275" text-anchor="middle" fill="white" font-size="68" font-family="'Noto Sans Bengali', 'Hind Siliguri', Georgia, serif" font-weight="700" letter-spacing="-1">সঠিক বাংলা ক্যালেন্ডার</text>

  <!-- Subtitle -->
  <text x="600" y="345" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="32" font-family="'Inter', 'Segoe UI', sans-serif" font-weight="400">Authentic Bengali Calendar · Panjika 2026</text>

  <!-- Divider -->
  <rect x="460" y="385" width="280" height="1.5" rx="1" fill="rgba(255,255,255,0.18)"/>

  <!-- Feature pills -->
  <text x="600" y="435" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="26" font-family="'Inter', sans-serif">তিথি · নক্ষত্র · যোগ · করণ · শুভ মুহূর্ত</text>

  <!-- Domain -->
  <text x="600" y="510" text-anchor="middle" fill="rgba(255,255,255,0.32)" font-size="20" font-family="'Inter', monospace" letter-spacing="1">sothikbanglacalendar.live</text>
</svg>